<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Neo Copilot — Cartografia do Conhecimento
       Ícone: bússola em latão sobre fundo ink -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1B2430"/>
      <stop offset="1" stop-color="#2c3a4c"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E1A257"/>
      <stop offset="1" stop-color="#A66F2E"/>
    </linearGradient>
  </defs>

  <!-- Fundo com cantos arredondados (safe para maskable Android quando purpose="maskable") -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Círculo da bússola -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#brass)" stroke-width="16" stroke-linecap="round"/>

  <!-- Marcadores cardeais (traços) -->
  <g stroke="#C98A3E" stroke-width="8" stroke-linecap="round" opacity="0.55">
    <line x1="256" y1="86"  x2="256" y2="118"/>
    <line x1="256" y1="394" x2="256" y2="426"/>
    <line x1="86"  y1="256" x2="118" y2="256"/>
    <line x1="394" y1="256" x2="426" y2="256"/>
  </g>

  <!-- Agulha (losango): NE claro, SW escuro -->
  <polygon points="346,166 301,301 166,346 211,211" fill="url(#brass)"/>
  <polygon points="346,166 256,256 211,211" fill="#E1A257" opacity="0.9"/>

  <!-- Ponto central -->
  <circle cx="256" cy="256" r="10" fill="#1B2430" stroke="#C98A3E" stroke-width="3"/>
</svg>
